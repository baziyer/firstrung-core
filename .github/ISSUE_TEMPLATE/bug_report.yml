name: Bug report
description: Report a reproducible issue in the public FirstRung Core packages.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include private code, raw prompts, raw diffs, logs, env values,
        tokens, candidate data, or customer data. Use synthetic examples.
  - type: input
    id: package
    attributes:
      label: Package or command
      description: Which package or CLI command is affected?
      placeholder: "firstrung scan, @firstrung/collector, @firstrung/report"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0-alpha.2"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Provide minimal synthetic steps.
      placeholder: |
        1. Create a toy Git repo...
        2. Run `firstrung scan ...`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Node:
        npm:
        Git:
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have not included private code, prompts, logs, env values, secrets, or candidate/customer data.
          required: true
