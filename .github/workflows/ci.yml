name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Install
        run: npm ci

      - name: Check and deterministic evaluation
        run: npm run check:ci

      - name: Probe optional Pi Coach lockdown
        run: npm run probe:lockdown --workspace @firstrung/pi-coach

      - name: Package dry run
        run: npm run pack:dry-run

  deterministic-node-floor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up exact deterministic Node floor
        uses: actions/setup-node@v4
        with:
          node-version: 22.6.0
          cache: npm

      - name: Install
        run: npm ci

      - name: Check deterministic packages at Node 22.6.0
        run: npm run check:deterministic-node-floor
